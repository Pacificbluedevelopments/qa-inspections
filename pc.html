<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacific Blue – PC Certificate</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',Arial,sans-serif;background:#F7F6F4;color:#1A1F24;}
.content{max-width:680px;margin:0 auto;background:#fff;min-height:100vh;}
.hdr{background:#333F48;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.hdr-logo{background:#fff;padding:5px 12px;border-radius:6px;}
.hdr-logo img{height:24px;display:block;}
.hdr-right{text-align:right;color:rgba(255,255,255,.65);font-size:11px;line-height:1.8;}
.hdr-right strong{color:#fff;font-size:13px;display:block;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;background:#F7F6F4;padding:14px 20px;font-size:12px;}
.mr{display:flex;gap:6px;padding:3px 0;}.ml{color:#9A9690;font-weight:500;white-space:nowrap;}.mv{font-weight:600;}
.divider{height:1px;background:#E4E0DA;}
.disclaimer{background:#F0EDE8;padding:14px 20px;font-size:12px;color:#5C5A57;line-height:1.7;border-bottom:1px solid #E4E0DA;}
.disclaimer-title{font-size:10px;font-weight:700;color:#B7B09C;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.part-header{background:#333F48;padding:9px 20px;}
.part-header-txt{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em;}
.part2-header{background:#5C5A57;}
.item{border-bottom:1px solid #E4E0DA;padding:14px 20px;}
.item-trade{font-size:10px;font-weight:700;color:#B7B09C;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.item-desc{font-size:14px;color:#1A1F24;line-height:1.6;margin-bottom:8px;}
.item-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid;}
.badge-defect{background:#F5E8E5;color:#6B2318;border-color:#A84232;}
.badge-omission{background:#FFF3E0;color:#7A4000;border-color:#E07800;}
.rect-date{font-size:12px;color:#9A9690;}
.item-photos img{width:100%;max-width:100%;height:auto;border-radius:6px;border:1px solid #ddd;display:block;margin-top:8px;}
.nil-row{padding:14px 20px;font-size:13px;color:#9A9690;font-style:italic;}
.sig-section{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:24px 20px;}
.sig-label{font-size:11px;color:#9A9690;margin-bottom:4px;}
.sig-name{font-size:12px;font-weight:600;color:#1A1F24;margin-bottom:8px;}
.sig-img{width:100%;height:70px;object-fit:contain;border-bottom:1.5px solid #333F48;display:block;}
.sig-date{font-size:11px;color:#9A9690;margin-top:4px;}
.contractor-details{padding:12px 20px;background:#F7F6F4;border-top:1px solid #E4E0DA;font-size:11px;color:#9A9690;text-align:center;line-height:1.8;}
.footer{padding:12px 20px 32px;font-size:10px;color:#9A9690;text-align:center;border-top:1px solid #E4E0DA;margin-top:16px;}
.loading{text-align:center;padding:64px 20px;color:#9A9690;font-size:13px;}
.spinner{width:32px;height:32px;border:3px solid #E4E0DA;border-top-color:#333F48;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media print{*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style>
</head>

const db = firebase.firestore();

async function loadCert() {
  const params = new URLSearchParams(window.location.search);
  const jobId = params.get('job');
  const certId = params.get('cert');
  if (!jobId || !certId) {
    document.getElementById('report-content').innerHTML = '<div class="loading">Missing parameters.</div>';
    return;
  }
  try {
    const [jobDoc, certDoc] = await Promise.all([
      db.collection('jobs').doc(jobId).get(),
      db.collection('jobs').doc(jobId).collection('pc-certificates').doc(certId).get()
    ]);
    if (!certDoc.exists) {
      document.getElementById('report-content').innerHTML = '<div class="loading">Certificate not found.</div>';
      return;
    }
    const job = jobDoc.data() || {};
    const cert = certDoc.data();
    document.title = 'PC Certificate – ' + cert.jobAddress;
    document.getElementById('hdr-sub').textContent = cert.date;

    function renderItems(items, isPart1) {
      if (!items || !items.length) return '<div class="nil-row">NIL</div>';
      return items.map(function(item) {
        const badgeHtml = item.badge === 'defect'
          ? '<span class="badge badge-defect">Minor Defect</span>'
          : item.badge === 'omission'
          ? '<span class="badge badge-omission">Minor Omission</span>' : '';
        const rectHtml = isPart1 && item.rectDate
          ? '<span class="rect-date">Rectification by: <strong>' + item.rectDate + '</strong></span>' : '';
        const photosHtml = item.photos && item.photos.length
          ? item.photos.map(function(p){ return '<img src="' + p + '">'; }).join('') : '';
        return '<div class="item">' +
          (item.trade ? '<div class="item-trade">' + item.trade + '</div>' : '') +
          '<div class="item-desc">' + (item.desc||'').replace(/
/g,'<br>') + '</div>' +
          '<div class="item-meta">' + badgeHtml + rectHtml + '</div>' +
          (photosHtml ? '<div class="item-photos">' + photosHtml + '</div>' : '') +
          '</div>';
      }).join('');
    }

    document.getElementById('report-content').innerHTML =
      '<div class="meta-grid">' +
        '<div class="mr"><span class="ml">Contractor</span><span class="mv">Pacific Blue Developments Pty Ltd</span></div>' +
        '<div class="mr"><span class="ml">ACN</span><span class="mv">095 153 254</span></div>' +
        '<div class="mr"><span class="ml">Owner</span><span class="mv">' + cert.owner + '</span></div>' +
        '<div class="mr"><span class="ml">QBCC</span><span class="mv">741 312</span></div>' +
        '<div class="mr"><span class="ml">Address</span><span class="mv">' + cert.jobAddress + '</span></div>' +
        '<div class="mr"><span class="ml">ABN</span><span class="mv">81 095 153 254</span></div>' +
        '<div class="mr"><span class="ml">Date of PC</span><span class="mv">' + cert.date + '</span></div>' +
        '<div class="mr"><span class="ml">Job number</span><span class="mv">' + cert.jobNumber + '</span></div>' +
      '</div>' +

      '<div class="part-header"><div class="part-header-txt">Part 1 — Minor defects &amp; omissions agreed by both parties</div></div>' +
      renderItems(cert.part1, true) +
      '<div class="part-header part2-header"><div class="part-header-txt">Part 2 — Items claimed by Owner but not agreed by Contractor</div></div>' +
      renderItems(cert.part2, false) +
      '<div class="divider"></div>' +
      '<div class="sig-section">' +
        '<div>' +
          '<div class="sig-label">Signature of Owner/s</div>' +
          '<div class="sig-name">' + cert.owner + '</div>' +
          (cert.ownerSigURL ? '<img class="sig-img" src="' + cert.ownerSigURL + '">' : '<div style="height:70px;border-bottom:1.5px solid #333;"></div>') +
          '<div class="sig-date">Date: ' + cert.date + '</div>' +
        '</div>' +
        '<div>' +
          '<div class="sig-label">Signature of Contractor</div>' +
          '<div class="sig-name">Pacific Blue Developments Pty Ltd</div>' +
          (cert.contractorSigURL ? '<img class="sig-img" src="' + cert.contractorSigURL + '">' : '<div style="height:70px;border-bottom:1.5px solid #333;"></div>') +
          '<div class="sig-date">Date: ' + cert.date + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="contractor-details">Pacific Blue Developments Pty Ltd &nbsp;|&nbsp; (07) 5479 2087 &nbsp;|&nbsp; enquiries@pacific-blue.com.au<br>2/64 Sugar Road, Maroochydore Q 4558 &nbsp;|&nbsp; QBCC 741 312 &nbsp;|&nbsp; ABN 81 095 153 254</div>' +
      '<div class="footer">This Certificate of Practical Completion was generated by the Pacific Blue QA system</div>';
