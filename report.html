<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacific Blue – QA Report</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',Arial,sans-serif;background:#F7F6F4;color:#1A1F24;}
.hdr{background:#333F48;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.hdr-logo{background:#fff;padding:4px 10px;border-radius:5px;}
.hdr-logo img{height:22px;display:block;}
.hdr-right{text-align:right;color:rgba(255,255,255,.6);font-size:11px;line-height:1.7;}
.content{max-width:680px;margin:0 auto;background:#fff;min-height:100vh;}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:5px 24px;background:#F7F6F4;padding:13px 16px;font-size:12px;}
.mr{display:flex;gap:6px;padding:3px 0;}
.ml{color:#9A9690;font-weight:500;white-space:nowrap;}
.mv{font-weight:600;}
.verdict{padding:14px 16px;margin:12px 16px;border-radius:8px;border:1.5px solid;}
.vl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:2px;}
.vr{font-size:18px;font-weight:700;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-bottom:16px;}
.sc{background:#F7F6F4;padding:10px;border-radius:8px;text-align:center;}
.sv{font-size:22px;font-weight:700;}
.sl{font-size:10px;color:#9A9690;text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.items-hdr{background:#333F48;padding:8px 16px;margin-bottom:0;}
.items-hdr-txt{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em;}
.item{border-bottom:1px solid #E4E0DA;padding:14px 16px;}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.item-left{flex:1;}
.item-num{font-size:10px;font-weight:700;color:#9A9690;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.item-name{font-size:14px;font-weight:700;color:#1A1F24;}
.badge{display:inline-block;font-weight:700;font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid;margin-left:12px;white-space:nowrap;flex-shrink:0;}
.item-req{font-size:12px;color:#5C5A57;line-height:1.55;margin-bottom:6px;}
.item-note{font-size:12px;color:#333;background:#F7F6F4;padding:8px 10px;border-radius:6px;border-left:3px solid #B7B09C;margin-bottom:8px;}
.item-photos{margin-top:8px;}
.item-photos img{width:100%;max-width:100%;height:auto;border-radius:6px;border:1px solid #ddd;display:block;margin-bottom:8px;}
.sigs{display:grid;grid-template-columns:1fr 1fr;gap:32px;padding:24px 16px;}
.sig{border-top:1px solid #333;padding-top:6px;font-size:11px;color:#666;}
.footer{padding:12px 16px 32px;font-size:10px;color:#9A9690;text-align:center;border-top:1px solid #E4E0DA;}
.loading{text-align:center;padding:64px 16px;color:#9A9690;}
.spinner{width:32px;height:32px;border:3px solid #E4E0DA;border-top-color:#333F48;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media print{
  body{background:#fff;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>

    <div class="hdr-right" id="hdr-meta">QA Inspection Report</div>
  </div>
  <div id="report-content"><div class="loading"><div class="spinner"></div>Loading report…</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBZFQgLMLKQF80_CMYqSq5ZcbJM0_H9w2M",
  authDomain: "pacific-blue-qa.firebaseapp.com",
  projectId: "pacific-blue-qa",
  storageBucket: "pacific-blue-qa.firebasestorage.app",
  messagingSenderId: "136808210337",
  appId: "1:136808210337:web:ae0fb3aff55195168f35e0"
});
const db = firebase.firestore();

async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const jobId = params.get('job');
  const inspId = params.get('insp');
  if (!jobId || !inspId) {
    document.getElementById('report-content').innerHTML = '<div class="loading">No report specified.</div>';
    return;
  }
  try {
    const [jobDoc, inspDoc] = await Promise.all([
      db.collection('jobs').doc(jobId).get(),
      db.collection('jobs').doc(jobId).collection('inspections').doc(inspId).get()
    ]);
    if (!jobDoc.exists || !inspDoc.exists) {
      document.getElementById('report-content').innerHTML = '<div class="loading">Report not found.</div>';
      return;
    }
    const job = { id: jobDoc.id, ...jobDoc.data() };
    const insp = { id: inspDoc.id, ...inspDoc.data() };
    // Use savedItems if present (covers Defect Register and ad hoc items added on site)
    let items = [];
    if (insp.savedItems && insp.savedItems.length) {
      items = insp.savedItems.map(function(item){ return { name: item.name, desc: item.desc }; });
    } else {
      const clDoc = await db.collection('checklists').doc(insp.checklistId).get();
      items = clDoc.exists ? clDoc.data().items : [];
    }
    const results = insp.results || {};
    const notes = insp.notes || {};
    const photos = insp.photoURLs || insp.photos || {};
    const p = insp.pass||0, f = insp.fail||0, na = insp.na||0, out = insp.outstanding||0;
    const allPass = f===0 && out===0;
    const verdict = allPass ? 'PASSED' : 'REQUIRES RECTIFICATION';
    const vBg = allPass?'#E8F0E8':'#F5E8E5';
    const vCol = allPass?'#1E4D1E':'#6B2318';
    const vBd = allPass?'#4A7C4A':'#A84232';

    document.title = 'Pacific Blue – ' + (insp.type||'QA') + ' – ' + job.address;
    document.getElementById('hdr-meta').innerHTML = (insp.type||'') + '<br>' + (insp.date||'') + ' · ' + (insp.time||'');

    let itemsHtml = '';
    items.forEach((item, idx) => {
      const num = String(idx+1);
      const r = results[num]||'—';
      const nt = notes[num]||'';
      const ph = (photos[num]||[]).filter(Boolean);
      const rBg = r==='PASS'?'#E8F0E8':r==='FAIL'?'#F5E8E5':r==='NA'?'#F0EDE8':'#fff';
      const rCol = r==='PASS'?'#1E4D1E':r==='FAIL'?'#6B2318':r==='NA'?'#4A4540':'#333';
      const rBd = r==='PASS'?'#4A7C4A':r==='FAIL'?'#A84232':r==='NA'?'#8A8278':'#ccc';
      itemsHtml += `
        <div class="item">
          <div class="item-row">
            <div class="item-left">
              <div class="item-num">Item ${num}</div>
              <div class="item-name">${item.name}</div>
            </div>
            <span class="badge" style="background:${rBg};color:${rCol};border-color:${rBd};">${r}</span>
          </div>
          <div class="item-req">${item.desc}</div>
          ${nt?`<div class="item-note">${nt}</div>`:''}
          ${ph.length?`<div class="item-photos">${ph.map(s=>`<img src="${s}">`).join('')}</div>`:''}
        </div>`;
    });

    document.getElementById('report-content').innerHTML = `
      <div class="meta">
        <div class="mr"><span class="ml">Address</span><span class="mv">${job.address}</span></div>
        <div class="mr"><span class="ml">Job</span><span class="mv">${job.jobNumber}</span></div>
        <div class="mr"><span class="ml">Inspector</span><span class="mv">${insp.inspector||''}</span></div>
        <div class="mr"><span class="ml">Supervisor</span><span class="mv">${insp.supervisor||''}</span></div>
        <div class="mr"><span class="ml">Subcontractor</span><span class="mv">${insp.subcontractor||''}</span></div>
        <div class="mr"><span class="ml">Date</span><span class="mv">${insp.date||''}, ${insp.time||''}</span></div>
      </div>
      <div class="verdict" style="background:${vBg};border-color:${vBd};">
        <div class="vl" style="color:${vCol};">Overall result</div>
        <div class="vr" style="color:${vCol};">${verdict}</div>
      </div>
      <div class="stats">
        <div class="sc"><div class="sv" style="color:#1E4D1E">${p}</div><div class="sl">Pass</div></div>
        <div class="sc"><div class="sv" style="color:#6B2318">${f}</div><div class="sl">Fail</div></div>
        <div class="sc"><div class="sv" style="color:#4A4540">${na}</div><div class="sl">N/A</div></div>
        <div class="sc"><div class="sv">${out}</div><div class="sl">Outstanding</div></div>
      </div>
      <div class="items-hdr"><div class="items-hdr-txt">Inspection items</div></div>
      ${itemsHtml}
      <div class="sigs">
        <div class="sig">Inspector signature &amp; date</div>
        <div class="sig">Supervisor signature &amp; date</div>
      </div>
      <div class="footer">Pacific Blue · Design. Construct. Immerse</div>
    `;
  } catch(e) {
    document.getElementById('report-content').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
  }
}

loadReport();
</script>
