<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pacific Blue – Slab QA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
button,input,textarea,label{font-family:'Poppins',sans-serif;touch-action:manipulation;-webkit-appearance:none;}
body{font-family:'Poppins',-apple-system,sans-serif;background:#F7F6F4;color:#1A1F24;min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}
.bar{background:#333F48;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:50;}
.bar-row{display:flex;justify-content:space-between;align-items:center;}
.bar-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;opacity:.55;font-weight:500;}
.bar-title{font-size:16px;font-weight:600;margin-top:2px;}
.bar-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;}
.prog-wrap{height:2px;background:rgba(255,255,255,.15);margin-top:10px;}
.prog-fill{height:2px;background:#B7B09C;transition:width .3s;}
.prog-txt{font-size:11px;opacity:.55;padding:5px 0 10px;}
.body{padding:20px 16px 48px;}
.logo-wrap{text-align:center;margin-bottom:28px;padding-top:4px;}
.logo-img{width:100%;max-width:240px;height:auto;}
.tagline{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#B7B09C;margin-top:6px;font-weight:500;}
.card{background:#fff;border-radius:12px;border:1px solid #E4E0DA;padding:18px 16px;margin-bottom:12px;}
.card-h{font-size:11px;font-weight:600;color:#B7B09C;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.field{margin-bottom:12px;}.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:11px;font-weight:600;color:#9A9690;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.field input{width:100%;padding:12px 14px;font-size:14px;border:1.5px solid #E4E0DA;border-radius:8px;background:#F7F6F4;color:#1A1F24;outline:none;}
.field input:focus{border-color:#333F48;background:#fff;}
.start-btn{width:100%;padding:16px;background:#333F48;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.02em;}
.icard{background:#fff;border-bottom:1px solid #E4E0DA;padding:16px;border-left:3px solid transparent;}
.icard.is-pass{border-left-color:#4A7C4A;}.icard.is-fail{border-left-color:#A84232;}.icard.is-na{border-left-color:#8A8278;}
.inum{font-size:11px;color:#9A9690;font-weight:600;margin-bottom:3px;letter-spacing:.04em;}
.iname{font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-.01em;}
.ireq{font-size:13px;color:#5C5A57;line-height:1.6;margin-bottom:14px;}
.btn-row{display:flex;gap:8px;margin-bottom:14px;}
.rbtn{flex:1;padding:13px 4px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #E4E0DA;background:#F7F6F4;color:#9A9690;display:flex;align-items:center;justify-content:center;gap:5px;}
.rbtn.sel-pass{background:#E8F0E8;border-color:#4A7C4A;color:#1E4D1E;}
.rbtn.sel-fail{background:#F5E8E5;border-color:#A84232;color:#6B2318;}
.rbtn.sel-na{background:#F0EDE8;border-color:#8A8278;color:#4A4540;}
.note-label{display:block;font-size:11px;font-weight:600;color:#9A9690;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.note-field{width:100%;padding:11px 12px;font-size:13px;line-height:1.6;border:1.5px solid #E4E0DA;border-radius:8px;background:#F7F6F4;color:#1A1F24;resize:none;min-height:72px;outline:none;margin-bottom:12px;}
.photo-label-btn{display:inline-flex;align-items:center;gap:8px;background:#F0EDE8;border:1.5px solid #DDD9D2;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;color:#333F48;cursor:pointer;}
.photos-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.thumb-wrap{position:relative;display:inline-block;}
.thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1.5px solid #E4E0DA;display:block;}
.thumb-del{position:absolute;top:-7px;right:-7px;width:22px;height:22px;background:#333F48;border:2px solid #fff;border-radius:50%;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:#fff;border:1px solid #E4E0DA;border-radius:12px;padding:14px;text-align:center;}
.stat-val{font-size:30px;font-weight:700;letter-spacing:-.02em;}
.stat-lbl{font-size:10px;color:#9A9690;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:2px;}
.verdict{border-radius:10px;padding:15px 16px;margin-bottom:18px;border:1.5px solid;}
.verdict.vpass{background:#E8F0E8;border-color:#4A7C4A;}.verdict.vpass .vl,.verdict.vpass .vr{color:#1E4D1E;}
.verdict.vfail{background:#F5E8E5;border-color:#A84232;}.verdict.vfail .vl,.verdict.vfail .vr{color:#6B2318;}
.vl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:3px;}
.vr{font-size:17px;font-weight:700;letter-spacing:-.01em;}
.meta-card{background:#fff;border:1px solid #E4E0DA;border-radius:12px;padding:4px 16px;margin-bottom:18px;}
.meta-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #E4E0DA;font-size:13px;}
.meta-row:last-child{border-bottom:none;}
.meta-k{color:#9A9690;font-weight:500;font-size:12px;}
.meta-v{font-weight:600;text-align:right;max-width:60%;}
.action-card{background:#fff;border:1.5px solid #DDD9D2;border-radius:12px;padding:18px 16px;margin-bottom:14px;}
.action-card h3{font-size:14px;font-weight:700;color:#333F48;margin-bottom:3px;}
.action-card p{font-size:12px;color:#5C5A57;margin-bottom:14px;line-height:1.6;}
.save-btn{width:100%;padding:15px;background:#B7B09C;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.email-btn{width:100%;padding:15px;background:#333F48;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.restart-btn{width:100%;padding:13px;background:transparent;color:#5C5A57;border:1.5px solid #E4E0DA;border-radius:10px;font-size:14px;cursor:pointer;margin-bottom:32px;}
.fi-card{background:#F5E8E5;border-radius:8px;padding:13px;margin-bottom:8px;border:1px solid #A84232;}
.fi-num{font-size:10px;color:#6B2318;opacity:.7;font-weight:600;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;}
.fi-name{font-size:14px;font-weight:600;color:#6B2318;}
.fi-note{font-size:12px;color:#6B2318;margin-top:4px;line-height:1.5;opacity:.85;}
.fi-photos{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.fi-thumb{width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid #A84232;}
.sec-h{font-size:11px;font-weight:700;color:#9A9690;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
</style>
</head>

const ITEMS = [
  ["1","Surface finish","Slab surface is smooth, trowelled to specification, free from ridges, tears, or trowel marks"],
  ["2","Level / fall","Surface level within tolerance (±10 mm) or correct fall to drainage where required per plans"],
  ["3","Cracks","No structural cracking present; any minor plastic shrinkage cracks within acceptable limits"],
  ["4","Edge profiles","Slab edges straight, formed to correct depth and profile, free from honeycombing or voids"],
  ["5","Rebate / step-downs","All rebates (garage, alfresco, wet areas) at correct depth and location per approved plans"],
  ["6","Holding down bolts","HD bolts correctly located, plumb, and at correct projection height per engineer's specification"],
  ["7","Service penetrations","All pipe and conduit penetrations in correct location; properly sealed around penetrations"],
  ["8","Cover to reinforcement","Reinforcement not visible at surface or edges; minimum cover maintained throughout"],
  ["9","Dimensional check","Slab dimensions (length, width, thickness) verified against approved drawings"],
];

let meta = {}, results = {}, notes = {}, photos = {};

function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, 1200 / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function startInspection() {
  meta = {
    addr: document.getElementById('f-addr').value || 'Not specified',
    job:  document.getElementById('f-job').value  || 'Not specified',
    ins:  document.getElementById('f-ins').value  || 'Not specified',
    sup:  document.getElementById('f-sup').value  || 'Not specified',
    sub:  document.getElementById('f-sub').value  || 'Not specified',
    date: new Date().toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}),
    time: new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})
  };
  buildChecklist();
  showScreen('screen-check');
}

function buildChecklist() {
  const body = document.getElementById('checklist-body');
  body.innerHTML = '';
  ITEMS.forEach(([num, name, req]) => {
    const div = document.createElement('div');
    div.className = 'icard';
    div.id = 'card-' + num;
    div.innerHTML = `
      <div class="inum">Item ${num}</div>
      <div class="iname">${name}</div>
      <div class="ireq">${req}</div>
      <div class="btn-row">
        <button class="rbtn" onclick="setResult('${num}','PASS',this)">✓ Pass</button>
        <button class="rbtn" onclick="setResult('${num}','FAIL',this)">✗ Fail</button>
        <button class="rbtn" onclick="setResult('${num}','NA',this)">— N/A</button>
      </div>
      <label class="note-label">Notes</label>
      <textarea class="note-field" id="note-${num}" placeholder="Add notes for this item…" oninput="notes['${num}']=this.value"></textarea>
      <label class="note-label">Photos</label>
      <div class="photos-row" id="photos-${num}"></div>
      <label class="photo-label-btn">
        📷 Add photo
        <input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotos('${num}',this)">
      </label>
    `;
    body.appendChild(div);
  });
  updateProgress();
}

function setResult(num, val, btn) {
  results[num] = val;
  const card = document.getElementById('card-' + num);
  card.className = 'icard' + (val==='PASS' ? ' is-pass' : val==='FAIL' ? ' is-fail' : ' is-na');
  card.querySelectorAll('.rbtn').forEach(b => b.classList.remove('sel-pass','sel-fail','sel-na'));
  btn.classList.add(val==='PASS' ? 'sel-pass' : val==='FAIL' ? 'sel-fail' : 'sel-na');
  updateProgress();
}

async function handlePhotos(num, input) {
  if (!photos[num]) photos[num] = [];
  const row = document.getElementById('photos-' + num);
  for (const file of Array.from(input.files)) {
    const compressed = await compressImage(file);
    const idx = photos[num].length;
    photos[num].push(compressed);
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    wrap.id = 'thumb-' + num + '-' + idx;
    wrap.innerHTML = `<img class="thumb" src="${compressed}"><button class="thumb-del" onclick="removePhoto('${num}',${idx})">×</button>`;
    row.appendChild(wrap);
  }
  input.value = '';
}

function removePhoto(num, idx) {
  photos[num][idx] = null;
  const wrap = document.getElementById('thumb-' + num + '-' + idx);
  if (wrap) wrap.remove();
}

function updateProgress() {
  const done = Object.keys(results).length;
  const pct = Math.round(done / ITEMS.length * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = done + ' of ' + ITEMS.length + ' items inspected';
}

function getCounts() {
  let p=0, f=0, na=0, fi=[];
  ITEMS.forEach(([num, nm]) => {
    const r = results[num];
    if (r==='PASS') p++;
    else if (r==='FAIL') { f++; fi.push({num, nm, note: notes[num]||'', ph: (photos[num]||[]).filter(Boolean)}); }
    else if (r==='NA') na++;
  });
  return {p, f, na, fi, out: ITEMS.length - p - f - na};
}

function goSummary() {
  buildSummary();
  showScreen('screen-sum');
}

function buildSummary() {
  const {p, f, na, fi, out} = getCounts();
  const allPass = f===0 && out===0;
  const vClass = allPass ? 'vpass' : 'vfail';
  const vText = allPass ? 'Passed — ready for next stage' : f > 0 ? f + ' item' + (f>1?'s':'') + ' require rectification' : out + ' item' + (out>1?'s':'') + ' outstanding';

  const failHtml = fi.length ? `
    <div style="margin-bottom:20px;">
      <div class="sec-h">Items requiring rectification</div>
      ${fi.map(x => `<div class="fi-card">
        <div class="fi-num">Item ${x.num}</div>
        <div class="fi-name">${x.nm}</div>
        ${x.note ? `<div class="fi-note">${x.note}</div>` : ''}
        ${x.ph.length ? `<div class="fi-photos">${x.ph.map(s=>`<img class="fi-thumb" src="${s}">`).join('')}</div>` : ''}
      </div>`).join('')}
    </div>` : '';

  document.getElementById('sum-body').innerHTML = `
    <div style="font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px;">Inspection complete</div>
    <div style="font-size:13px;color:#5C5A57;margin-bottom:20px;">${meta.addr} · ${meta.date}</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val" style="color:#1E4D1E">${p}</div><div class="stat-lbl">Pass</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#6B2318">${f}</div><div class="stat-lbl">Fail</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#4A4540">${na}</div><div class="stat-lbl">N/A</div></div>
      <div class="stat-card"><div class="stat-val">${out}</div><div class="stat-lbl">Outstanding</div></div>
    </div>
    <div class="verdict ${vClass}">
      <div class="vl">Overall result</div>
      <div class="vr">${vText}</div>
    </div>
    ${failHtml}
    <div class="meta-card">
      <div class="meta-row"><span class="meta-k">Address</span><span class="meta-v">${meta.addr}</span></div>
      <div class="meta-row"><span class="meta-k">Job number</span><span class="meta-v">${meta.job}</span></div>
      <div class="meta-row"><span class="meta-k">Inspector</span><span class="meta-v">${meta.ins}</span></div>
      <div class="meta-row"><span class="meta-k">Supervisor</span><span class="meta-v">${meta.sup}</span></div>
      <div class="meta-row"><span class="meta-k">Subcontractor</span><span class="meta-v">${meta.sub}</span></div>
      <div class="meta-row"><span class="meta-k">Date / time</span><span class="meta-v">${meta.date}, ${meta.time}</span></div>
    </div>
    <div class="action-card">
      <h3>Send &amp; save report</h3>
      <p>Save the PDF first (with full-size photos), then generate the email. Outlook will open with the subject and summary ready — attach the PDF before sending.</p>
      <button class="save-btn" onclick="savePDF()">① Save PDF report</button>
      <button class="email-btn" onclick="generateEmail()">② Generate email in Outlook</button>
    </div>
    <button class="restart-btn" onclick="restartInspection()">Start new inspection</button>
  `;
}

function generateEmail() {
  const {p, f, na, fi, out} = getCounts();
  const verdict = f===0 && out===0 ? 'PASSED' : 'REQUIRES RECTIFICATION';
  const subj = encodeURIComponent('Slab – Post Pour QA Inspection | ' + meta.addr + ' | ' + meta.date);
  let body = 'PACIFIC BLUE BUILDING\nSlab – Post Pour QA Inspection\n' + '='.repeat(44) + '\n\n';
  body += 'Address:       ' + meta.addr + '\nJob Number:    ' + meta.job + '\nDate / Time:   ' + meta.date + ', ' + meta.time + '\nInspector:     ' + meta.ins + '\nSupervisor:    ' + meta.sup + '\nSubcontractor: ' + meta.sub + '\n\n';
  body += 'OVERALL RESULT: ' + verdict + '\n';
  body += 'Pass: ' + p + '  |  Fail: ' + f + '  |  N/A: ' + na + '  |  Outstanding: ' + out + '\n' + '-'.repeat(44) + '\n\n';
  if (fi.length) {
    body += 'ITEMS REQUIRING RECTIFICATION\n\n';
    fi.forEach(x => {
      body += '[Item ' + x.num + '] ' + x.nm + '\n';
      if (x.note) body += '  Note: ' + x.note + '\n';
      if (x.ph.length) body += '  Photos: ' + x.ph.length + ' image(s) — see attached PDF\n';
      body += '\n';
    });
  }
  body += '\nPlease find the full inspection report attached as a PDF.\n\nGenerated by Pacific Blue Building QA System.';
  window.location.href = 'mailto:?subject=' + subj + '&body=' + encodeURIComponent(body);
}

function savePDF() {
  const {p, f, na, fi, out} = getCounts();
  const allPass = f===0 && out===0;
  const verdict = allPass ? 'PASSED' : 'REQUIRES RECTIFICATION';
  const vBg = allPass ? '#E8F0E8' : '#F5E8E5';
  const vCol = allPass ? '#1E4D1E' : '#6B2318';
  const vBd = allPass ? '#4A7C4A' : '#A84232';

  let rows = '';
  ITEMS.forEach(([num, nm, rq]) => {
    const r = results[num] || '—';
    const nt = notes[num] || '';
    const ph = (photos[num] || []).filter(Boolean);
    const rBg = r==='PASS'?'#E8F0E8':r==='FAIL'?'#F5E8E5':r==='NA'?'#F0EDE8':'#fff';
    const rCol = r==='PASS'?'#1E4D1E':r==='FAIL'?'#6B2318':r==='NA'?'#4A4540':'#333';
    const rBd = r==='PASS'?'#4A7C4A':r==='FAIL'?'#A84232':r==='NA'?'#8A8278':'#ccc';
    const photoHtml = ph.length ? '<div style="margin-top:12px;">' + ph.map(s => '<img src="' + s + '" style="width:100%;max-width:500px;height:auto;border-radius:6px;border:1px solid #ddd;display:block;margin-bottom:8px;">').join('') + '</div>' : '';
    rows += '<tr><td style="padding:14px;vertical-align:top;border-bottom:1px solid #e8e4de;">' +
      '<div style="font-size:10px;font-weight:700;color:#9A9690;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Item ' + num + '</div>' +
      '<div style="font-size:13px;font-weight:700;color:#1A1F24;margin-bottom:5px;">' + nm + '</div>' +
      '<div style="font-size:12px;color:#5C5A57;line-height:1.55;">' + rq + '</div>' +
      (nt ? '<div style="font-size:12px;color:#333;background:#f7f6f4;padding:8px 10px;border-radius:6px;border-left:3px solid #B7B09C;margin-top:8px;">' + nt + '</div>' : '') +
      photoHtml + '</td>' +
      '<td style="padding:14px;vertical-align:top;text-align:center;border-bottom:1px solid #e8e4de;width:64px;">' +
      '<span style="display:inline-block;background:' + rBg + ';color:' + rCol + ';font-weight:700;font-size:11px;padding:5px 8px;border-radius:6px;border:1px solid ' + rBd + ';">' + r + '</span>' +
      '</td></tr>';
  });

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Pacific Blue – Slab Post Pour QA – ${meta.addr}</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;}body{font-family:Poppins,Arial,sans-serif;margin:0;padding:0;color:#1A1F24;}
  .hdr{background:#333F48;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;}
  .hdr img{height:34px;}.hdr-r{text-align:right;color:rgba(255,255,255,.6);font-size:11px;line-height:1.7;}
  .body{padding:22px 24px;}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:5px 24px;background:#F7F6F4;padding:13px 15px;border-radius:8px;margin-bottom:14px;font-size:12px;}
  .mr{display:flex;gap:6px;}.ml{color:#9A9690;font-weight:500;white-space:nowrap;}.mv{font-weight:600;}
  .verdict{padding:12px 15px;border-radius:8px;margin-bottom:14px;border:1.5px solid ${vBd};background:${vBg};}
  .vl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:${vCol};margin-bottom:2px;}
  .vr{font-size:17px;font-weight:700;color:${vCol};}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
  .sc{background:#F7F6F4;padding:11px;border-radius:8px;text-align:center;}
  .sv{font-size:22px;font-weight:700;}.sl{font-size:10px;color:#9A9690;text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
  table{width:100%;border-collapse:collapse;}
  th{background:#333F48;color:#fff;padding:9px 14px;font-size:11px;text-align:left;font-weight:600;letter-spacing:.04em;}
  .sigs{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:40px;}
  .sig{border-top:1px solid #333;padding-top:6px;font-size:11px;color:#666;}
  .footer{margin-top:20px;padding-top:12px;border-top:1px solid #E4E0DA;font-size:10px;color:#9A9690;text-align:center;}
  @media print{body{padding:0;}}</style></head><body>
  <div class="hdr"><img src="data:image/jpeg;base64,${LOGO}" alt="Pacific Blue"><div class="hdr-r"><div>Slab – Post Pour QA Inspection</div><div>${meta.date} · ${meta.time}</div></div></div>
  <div class="body">
  <div class="meta">
    <div class="mr"><span class="ml">Address:</span><span class="mv">${meta.addr}</span></div>
    <div class="mr"><span class="ml">Job Number:</span><span class="mv">${meta.job}</span></div>
    <div class="mr"><span class="ml">Inspector:</span><span class="mv">${meta.ins}</span></div>
    <div class="mr"><span class="ml">Supervisor:</span><span class="mv">${meta.sup}</span></div>
    <div class="mr"><span class="ml">Subcontractor:</span><span class="mv">${meta.sub}</span></div>
  </div>
  <div class="verdict"><div class="vl">Overall result</div><div class="vr">${verdict}</div></div>
  <div class="stats">
    <div class="sc"><div class="sv" style="color:#1E4D1E">${p}</div><div class="sl">Pass</div></div>
    <div class="sc"><div class="sv" style="color:#6B2318">${f}</div><div class="sl">Fail</div></div>
    <div class="sc"><div class="sv" style="color:#4A4540">${na}</div><div class="sl">N/A</div></div>
    <div class="sc"><div class="sv">${out}</div><div class="sl">Outstanding</div></div>
  </div>
  <table><thead><tr><th>Inspection item</th><th style="width:64px;text-align:center;">Result</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <div class="sigs"><div class="sig">Inspector signature &amp; date</div><div class="sig">Supervisor signature &amp; date</div></div>
  <div class="footer">Pacific Blue Building · Design. Construct. Immerse · Generated by the Pacific Blue QA inspection system</div>
  </div><script>window.onload=function(){window.print();}<\/script></body></html>`);
  win.document.close();
}

function restartInspection() {
  results={}; notes={}; photos={};
  ['f-addr','f-job','f-ins','f-sup','f-sub'].forEach(id => document.getElementById(id).value = '');
  showScreen('screen-setup');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
