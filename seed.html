<style>
body{font-family:Poppins,sans-serif;background:#333F48;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.card{background:#fff;border-radius:16px;padding:32px;max-width:420px;width:90%;text-align:center;}
.logo{width:180px;margin-bottom:24px;}
h2{font-size:18px;color:#333F48;margin-bottom:8px;}
p{font-size:13px;color:#9A9690;margin-bottom:24px;line-height:1.6;}
.btn{background:#333F48;color:#fff;border:none;border-radius:10px;padding:16px 32px;font-size:15px;font-weight:600;cursor:pointer;font-family:Poppins,sans-serif;width:100%;margin-bottom:10px;}
.btn:disabled{background:#B7B09C;cursor:not-allowed;}
.btn-red{background:#A84232;}
.log{text-align:left;background:#F7F6F4;border-radius:8px;padding:12px;margin-top:16px;font-size:12px;color:#5C5A57;max-height:240px;overflow-y:auto;display:none;}
.spinner{display:none;width:24px;height:24px;border:3px solid #E4E0DA;border-top-color:#333F48;border-radius:50%;animation:spin .8s linear infinite;margin:12px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

function log(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

function busy(yes) {
  document.getElementById('spinner').style.display = yes ? 'block' : 'none';
  document.getElementById('btn-add').disabled = yes;
  document.getElementById('btn-clear').disabled = yes;
}

async function doSignIn() {
  const email = prompt('Pacific Blue email:');
  if (!email) return;
  const pass = prompt('Password:');
  if (!pass) return;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    document.getElementById('btn-signin').style.display = 'none';
    document.getElementById('actions').style.display = 'block';
    log('Signed in as ' + email + ' ✓');
  } catch(e) {
    alert('Sign in failed: ' + e.message);
  }
}

async function addChecklists() {
  if (!confirm('Add all 25 checklists? This will not affect the Defect Register.')) return;
  busy(true);
  log('Adding ' + CHECKLISTS.length + ' checklists...');
  try {
    for (const cl of CHECKLISTS) {
      await db.collection('checklists').add(cl);
      log('✓ ' + cl.label + ' (' + cl.items.length + ' items)');
    }
    log('<strong>Done! All ' + CHECKLISTS.length + ' checklists added.</strong>');
  } catch(e) {
    log('Error: ' + e.message);
  }
  busy(false);
}

async function clearAndRestore() {
  if (!confirm('This will DELETE all checklists and restore only the Defect Register. Are you sure?')) return;
  busy(true);
  log('Deleting all checklists...');
  try {
    const snap = await db.collection('checklists').get();
    const batch = db.batch();
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
    log('All checklists deleted ✓');

    // Restore Defect Register first
    await db.collection('checklists').add({
      label: 'Defect Register',
      order: 0,
      isDefectRegister: true,
      items: []
    });
    log('Defect Register restored ✓');

    // Now add the 25 checklists
    log('Adding ' + CHECKLISTS.length + ' checklists...');
    for (const cl of CHECKLISTS) {
      await db.collection('checklists').add(cl);
      log('✓ ' + cl.label);
    }
    log('<strong>Done! Defect Register + ' + CHECKLISTS.length + ' checklists loaded.</strong>');
    log('Close this page and reload the app.');
  } catch(e) {
    log('Error: ' + e.message);
  }
  busy(false);
}
