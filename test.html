<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
.box{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;border:1px solid #ddd;}
.ok{color:green;font-weight:bold;}
.err{color:red;font-weight:bold;}
button{padding:12px 20px;background:#333;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;width:100%;margin-bottom:10px;}
</style>
</head>
<body>
<h2>Firebase Connection Test</h2>
<div id="status" class="box">Loading Firebase...</div>
<button onclick="testRead()">Test Read Jobs</button>
<button onclick="testWrite()">Test Write Job</button>
<div id="result" class="box">Results will appear here</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBZFQgLMLKQF80_CMYqSq5ZcbJM0_H9w2M",
  authDomain: "pacific-blue-qa.firebaseapp.com",
  projectId: "pacific-blue-qa",
  storageBucket: "pacific-blue-qa.firebasestorage.app",
  messagingSenderId: "136808210337",
  appId: "1:136808210337:web:ae0fb3aff55195168f35e0"
};

try {
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  document.getElementById('status').innerHTML = '<span class="ok">✓ Firebase initialised</span>';

  async function testRead() {
    document.getElementById('result').innerHTML = 'Reading...';
    try {
      const snap = await db.collection('jobs').get();
      document.getElementById('result').innerHTML = '<span class="ok">✓ Read success — ' + snap.size + ' jobs found</span>';
    } catch(e) {
      document.getElementById('result').innerHTML = '<span class="err">✗ Read failed: ' + e.message + '</span>';
    }
  }

  async function testWrite() {
    document.getElementById('result').innerHTML = 'Writing...';
    try {
      const ref = await db.collection('jobs').add({
        address: 'Test Job',
        jobNumber: 'TEST-001',
        client: 'Test',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById('result').innerHTML = '<span class="ok">✓ Write success — ID: ' + ref.id + '</span>';
    } catch(e) {
      document.getElementById('result').innerHTML = '<span class="err">✗ Write failed: ' + e.message + '</span>';
    }
  }

  window.testRead = testRead;
  window.testWrite = testWrite;

} catch(e) {
  document.getElementById('status').innerHTML = '<span class="err">✗ Firebase init failed: ' + e.message + '</span>';
}
</script>
</body>
</html>
